<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ushuru Watch · Finance Bill 2026 Personal Impact</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="app/v2/styles.css" />

<style>
  /* Host page chrome */
  html, body { height: 100%; }
  body {
    background: #0A0A0A;
    overflow-x: hidden;
  }
  /* Stage holds the prototype + optional phone frame */
  .stage[data-view="desktop"] { background: var(--k-white, #FAFAFA); min-height: 100vh; }
  .stage[data-view="mobile"] {
    background: #1a1a1a;
    padding: 32px 16px 60px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    min-height: 100vh;
  }
  .stage[data-view="mobile"] .stage-inner {
    width: 402px; max-width: 100%;
    height: 860px;
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    background: var(--k-white, #FAFAFA);
    box-shadow:
      0 0 0 12px #0A0A0A,
      0 0 0 13px #2a2a2a,
      0 50px 100px -30px rgba(0,0,0,0.6),
      0 30px 60px -30px rgba(0,0,0,0.45);
  }
  .stage[data-view="mobile"] .stage-inner::before {
    content: "";
    position: absolute;
    top: 11px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 37px; border-radius: 24px; background: #000; z-index: 90;
  }
  .stage[data-view="mobile"] .stage-inner::after {
    content: "9:41";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    padding: 18px 38px 0;
    display: flex; justify-content: flex-start;
    font: 600 14px/1 -apple-system,system-ui;
    color: #0A0A0A;
    z-index: 85;
    pointer-events: none;
  }
  .stage[data-view="mobile"] .kw {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding-top: 54px;
  }
  .stage[data-view="mobile"] .kw::-webkit-scrollbar { display: none; }
  .stage[data-view="mobile"] .kw { scrollbar-width: none; }
  /* Fixed elements scoped to phone */
  .stage[data-view="mobile"] .kw-fab,
  .stage[data-view="mobile"] .kw-chat {
    position: absolute !important;
  }
  /* Hero mega numeral hidden in mobile cropping */
  .stage[data-view="mobile"] .kw-hero-mega { display: none; }
  .stage[data-view="mobile"] .kw-nav { position: sticky; }

  .stage[data-view="mobile"] .frame-label {
    margin: 20px 0 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    text-align: center;
  }
  .stage[data-view="desktop"] .frame-label { display: none; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/i18n.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app/v2/app.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;
  const { TweaksPanel, TweakSection, TweakRadio, useTweaks } = window;

  const DEFAULTS = /*EDITMODE-BEGIN*/{
    "view": "auto",
    "lang": "en",
    "accent": "maroon"
  }/*EDITMODE-END*/;

  const PALETTES = {
    default:  { red: "#C8102E", green: "#006B3F", black: "#0A0A0A" },
    maroon:   { red: "#A1192E", green: "#0D5C3C", black: "#15131A" },
    safari:   { red: "#D9492F", green: "#3A6B47", black: "#1A140F" },
  };

  function App() {
    const [t, setTweak] = useTweaks(DEFAULTS);
    const [vw, setVw] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);

    useEffect(() => {
      const onResize = () => setVw(window.innerWidth);
      window.addEventListener("resize", onResize);
      return () => window.removeEventListener("resize", onResize);
    }, []);

    const view = t.view === "auto" ? (vw < 760 ? "mobile" : "desktop") : t.view;

    useEffect(() => {
      const p = PALETTES[t.accent] || PALETTES.default;
      const r = document.documentElement.style;
      r.setProperty("--k-red", p.red);
      r.setProperty("--k-green", p.green);
      r.setProperty("--k-black", p.black);
    }, [t.accent]);

    return (
      <>
        <div className="stage" data-view={view}>
          <div className="stage-inner">
            <UshuruAppV2 initialLang={t.lang} key={t.lang + view + t.accent} />
          </div>
          {view === "mobile" && (
            <div className="frame-label">PROTOTYPE · MOBILE (90% OF TRAFFIC)</div>
          )}
        </div>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Viewport">
            <TweakRadio
              label="View"
              value={t.view}
              onChange={(v) => setTweak("view", v)}
              options={[
                { value: "auto", label: "Auto" },
                { value: "mobile", label: "Mobile" },
                { value: "desktop", label: "Desktop" },
              ]}
            />
            <TweakRadio
              label="Language"
              value={t.lang}
              onChange={(v) => setTweak("lang", v)}
              options={[
                { value: "en", label: "ENG" },
                { value: "sw", label: "SWA" },
              ]}
            />
          </TweakSection>
          <TweakSection label="Palette">
            <TweakRadio
              label="Accent"
              value={t.accent}
              onChange={(v) => setTweak("accent", v)}
              options={[
                { value: "default", label: "Kenya" },
                { value: "maroon", label: "Maroon" },
                { value: "safari", label: "Safari" },
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
